name: Backend CI

on:
    push:
        paths:
            - "backend/**"
            - ".github/workflows/backend-ci.yml"
    pull_request:
        paths:
            - "backend/**"
            - ".github/workflows/backend-ci.yml"

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7
                ports:
                    - 6379:6379

        defaults:
            run:
                working-directory : backend
        
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            
            - run: pip install -r requirements.txt
            - run: python -m pytest
              env:
                ENV: test
                APP_ENV: test
                GROQ_API_KEY: dummy
                QDRANT_LOCAL_URL: http://localhost:6333
                QDRANT_API_KEY: dummy
                DOCS_USERNAME: test
                DOCS_PASSWORD: test123
                REDIS_URL: redis://localhost:6379
